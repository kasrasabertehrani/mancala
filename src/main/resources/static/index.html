<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Mancala</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body>

<div id="lobby-screen" class="screen active">
    <h1>Mancala</h1>
    <div class="card">
        <input type="text" id="player-name" placeholder="Enter your name..." />

        <div class="actions">
            <button id="btn-create" class="btn-primary">Create New Game</button>
        </div>
        <hr>
        <div class="actions">
            <input type="text" id="room-id-input" placeholder="Room ID to join..." />
            <button id="btn-join" class="btn-secondary">Join Game</button>
        </div>
    </div>
</div>

<div id="game-screen" class="screen">
    <div class="game-header">
        <h2 id="room-display">Room: ---</h2>
        <h3 id="status-display">Waiting for opponent...</h3>
        <div id="connection-status" class="hidden">Reconnecting...</div>
    </div>
    <div id="notification-container"></div>


    <!-- Board for Player 1 perspective -->
    <div id="board-player1" class="board-wrapper" style="display: none;">
        <div class="player-label top-label">Opponent's Side</div>
        <div class="board-container">
            <div class="store player2-store" id="p1-pit-13" data-pit-index="13">0</div>
            <div class="middle-pits">
                <div class="row player2-row">
                    <div class="pit" id="p1-pit-12" data-pit-index="12">4</div>
                    <div class="pit" id="p1-pit-11" data-pit-index="11">4</div>
                    <div class="pit" id="p1-pit-10" data-pit-index="10">4</div>
                    <div class="pit" id="p1-pit-9" data-pit-index="9">4</div>
                    <div class="pit" id="p1-pit-8" data-pit-index="8">4</div>
                    <div class="pit" id="p1-pit-7" data-pit-index="7">4</div>
                </div>
                <div class="row player1-row">
                    <div class="pit" id="p1-pit-0" data-pit-index="0">4</div>
                    <div class="pit" id="p1-pit-1" data-pit-index="1">4</div>
                    <div class="pit" id="p1-pit-2" data-pit-index="2">4</div>
                    <div class="pit" id="p1-pit-3" data-pit-index="3">4</div>
                    <div class="pit" id="p1-pit-4" data-pit-index="4">4</div>
                    <div class="pit" id="p1-pit-5" data-pit-index="5">4</div>
                </div>
            </div>
            <div class="store player1-store" id="p1-pit-6" data-pit-index="6">0</div>
        </div>
        <div class="player-label bottom-label">Your Side</div>
    </div>


    <!-- Board for Player 2 perspective -->
    <div id="board-player2" class="board-wrapper" style="display: none;">
        <div class="player-label top-label">Opponent's Side</div>
        <div class="board-container">
            <div class="store player1-store" id="p2-pit-6" data-pit-index="6">0</div>
            <div class="middle-pits">
                <div class="row player1-row">
                    <div class="pit" id="p2-pit-5" data-pit-index="5">4</div>
                    <div class="pit" id="p2-pit-4" data-pit-index="4">4</div>
                    <div class="pit" id="p2-pit-3" data-pit-index="3">4</div>
                    <div class="pit" id="p2-pit-2" data-pit-index="2">4</div>
                    <div class="pit" id="p2-pit-1" data-pit-index="1">4</div>
                    <div class="pit" id="p2-pit-0" data-pit-index="0">4</div>
                </div>
                <div class="row player2-row">
                    <div class="pit" id="p2-pit-7" data-pit-index="7">4</div>
                    <div class="pit" id="p2-pit-8" data-pit-index="8">4</div>
                    <div class="pit" id="p2-pit-9" data-pit-index="9">4</div>
                    <div class="pit" id="p2-pit-10" data-pit-index="10">4</div>
                    <div class="pit" id="p2-pit-11" data-pit-index="11">4</div>
                    <div class="pit" id="p2-pit-12" data-pit-index="12">4</div>
                </div>
            </div>
            <div class="store player2-store" id="p2-pit-13" data-pit-index="13">0</div>
        </div>
        <div class="player-label bottom-label">Your Side</div>
    </div>
</div>


<script src="app.js"></script>
</body>
</html>
