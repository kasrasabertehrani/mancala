<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mancala WebSocket API Docs</title>

    <link rel="stylesheet" href="https://unpkg.com/@asyncapi/react-component@1.0.0-next.39/styles/default.min.css">

    <style>
        body { margin: 0; padding: 0; background-color: #f3f4f6; }
        #asyncapi-container { height: 100vh; overflow-y: auto; }
    </style>
</head>
<body>

<div id="asyncapi-container"></div>

<script src="https://unpkg.com/@asyncapi/react-component@1.0.0-next.39/browser/standalone/index.js"></script>

<script>
    AsyncApiStandalone.render({
        schema: {
            url: '/asyncapi.yaml'
        },
        config: {
            show: {
                sidebar: true
            }
        }
    }, document.getElementById('asyncapi-container'));
</script>

</body>
</html>
